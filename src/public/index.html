<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentProxy - API 代理监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #f5f5f5; color: #333; }

    /* Top bar */
    .top-bar {
      height: 56px; background: #fff; border-bottom: 1px solid #e0e0e0;
      display: flex; align-items: center; padding: 0 20px; gap: 24px;
    }
    .top-bar .logo { font-size: 18px; font-weight: bold; color: #1a73e8; letter-spacing: 1px; }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .stat-item .label { color: #888; }
    .stat-item .value { color: #1a73e8; font-weight: bold; font-size: 15px; }
    .top-bar .spacer { flex: 1; }
    .top-bar label { font-size: 13px; color: #666; }
    .top-bar input[type="number"] {
      width: 60px; background: #fff; border: 1px solid #ccc; color: #333;
      border-radius: 4px; padding: 3px 6px; font-size: 13px; text-align: center;
    }
    .top-bar button {
      background: #fff; border: 1px solid #ccc; color: #1a73e8;
      border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px;
    }
    .top-bar button:hover { background: #eef4fd; }
    .top-bar button.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .top-bar button.danger { color: #d93025; border-color: #d9302544; }
    .top-bar button.danger:hover { background: #fce8e6; }

    /* Main layout */
    .main { display: flex; height: calc(100% - 56px); }

    /* Left panel - message list */
    .left-panel {
      width: 380px; min-width: 280px; border-right: 1px solid #e0e0e0;
      display: flex; flex-direction: column; background: #fff;
    }
    .left-panel .header {
      padding: 10px 14px; border-bottom: 1px solid #e0e0e0;
      font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .msg-list { flex: 1; overflow-y: auto; }
    .msg-item {
      padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      transition: background 0.15s;
    }
    .msg-item:hover { background: #f5f8fc; }
    .msg-item.selected { background: #e8f0fe; border-left: 3px solid #1a73e8; }
    .msg-item .msg-method {
      display: inline-block; font-size: 11px; font-weight: bold; padding: 1px 6px;
      border-radius: 3px; margin-right: 6px;
    }
    .msg-item .msg-seq {
      display: inline-block; font-size: 11px; color: #aaa; margin-right: 6px; min-width: 24px;
    }
    .msg-method.GET { background: #e6f4ea; color: #137333; }
    .msg-method.POST { background: #e8f0fe; color: #1a73e8; }
    .msg-method.PUT { background: #fef7e0; color: #b06000; }
    .msg-method.PATCH { background: #f3e8fd; color: #7627bb; }
    .msg-method.DELETE { background: #fce8e6; color: #c5221f; }
    .msg-item .msg-path { font-size: 13px; color: #333; word-break: break-all; }
    .msg-item .msg-meta {
      display: flex; gap: 10px; margin-top: 4px; font-size: 11px; color: #999;
    }
    .msg-item .msg-status { font-weight: bold; }
    .msg-status.s2xx { color: #137333; }
    .msg-status.s3xx { color: #1a73e8; }
    .msg-status.s4xx { color: #b06000; }
    .msg-status.s5xx { color: #c5221f; }
    .msg-item .sse-badge {
      display: inline-block; font-size: 10px; background: #e8f0fe; color: #1a73e8;
      padding: 0 5px; border-radius: 3px; margin-left: 6px;
    }
    .empty-state { padding: 40px 20px; text-align: center; color: #aaa; font-size: 14px; }

    /* Right panel - detail */
    .right-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .right-panel .header {
      padding: 10px 14px; border-bottom: 1px solid #e0e0e0; background: #fff;
      font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px;
      display: flex; align-items: center; gap: 12px;
    }
    .detail-content { flex: 1; overflow-y: auto; padding: 16px; }

    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e0e0e0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .copy-btn {
      font-size: 11px; text-transform: none; letter-spacing: 0;
      background: none; border: 1px solid #ccc; color: #666;
      border-radius: 4px; padding: 2px 8px; cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: #e8f0fe; color: #1a73e8; border-color: #1a73e8; }
    .copy-btn.copied { color: #137333; border-color: #137333; }
    .kv-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .kv-table td { padding: 3px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    .kv-table td:first-child { color: #888; width: 180px; white-space: nowrap; }
    .kv-table td:last-child { color: #333; word-break: break-all; }

    .body-block {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 12px; font-size: 12px; font-family: 'Fira Code', 'Consolas', monospace;
      white-space: pre-wrap; word-break: break-all; max-height: 500px; overflow-y: auto;
      line-height: 1.5; color: #333;
    }
    .body-block.sse-stream { max-height: 600px; }

    .no-selection {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #aaa; font-size: 15px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }

    /* Animation */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .live-dot {
      display: inline-block; width: 8px; height: 8px; background: #137333;
      border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite;
    }
    .live-dot.paused { background: #b06000; animation: none; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">AgentProxy</div>
    <div class="stat-item"><span class="label">消息总数</span><span class="value" id="stat-total">0</span></div>
    <div class="stat-item"><span class="label">SSE</span><span class="value" id="stat-sse">0</span></div>
    <div class="stat-item"><span class="label">错误</span><span class="value" id="stat-error">0</span></div>
    <div class="spacer"></div>
    <label>刷新间隔(s)</label>
    <input type="number" id="interval-input" min="1" max="60" value="3">
    <button id="btn-toggle-poll" class="active"><span class="live-dot" id="live-dot"></span>自动刷新</button>
    <button id="btn-clear" class="danger">清空</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="header"><span>消息列表</span><span id="msg-count">0</span></div>
      <div class="msg-list" id="msg-list">
        <div class="empty-state">暂无消息，请通过代理端口发送请求</div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="header" id="detail-header">消息详情</div>
      <div class="detail-content" id="detail-content">
        <div class="no-selection">选择左侧消息查看详情</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = location.origin;
    let messages = [];
    let selectedId = null;
    let polling = true;
    let pollTimer = null;
    let lastTimestamp = 0;

    // DOM refs
    const elMsgList = document.getElementById('msg-list');
    const elDetailContent = document.getElementById('detail-content');
    const elDetailHeader = document.getElementById('detail-header');
    const elStatTotal = document.getElementById('stat-total');
    const elStatSSE = document.getElementById('stat-sse');
    const elStatError = document.getElementById('stat-error');
    const elMsgCount = document.getElementById('msg-count');
    const elIntervalInput = document.getElementById('interval-input');
    const elBtnToggle = document.getElementById('btn-toggle-poll');
    const elLiveDot = document.getElementById('live-dot');
    const elBtnClear = document.getElementById('btn-clear');

    // --- API helpers ---
    async function fetchAllMessages() {
      const res = await fetch(`${API_BASE}/api/messages`);
      messages = await res.json();
      lastTimestamp = messages.length > 0 ? Math.max(...messages.map(m => m.timestamp)) : 0;
      render();
    }

    async function fetchLatestMessages() {
      const res = await fetch(`${API_BASE}/api/messages/latest?after=${lastTimestamp}`);
      const newMsgs = await res.json();
      if (newMsgs.length > 0) {
        messages = messages.concat(newMsgs);
        lastTimestamp = Math.max(...newMsgs.map(m => m.timestamp));
        render();
      }
    }

    async function fetchStats() {
      const res = await fetch(`${API_BASE}/api/stats`);
      const stats = await res.json();
      elStatTotal.textContent = stats.totalMessages;
      elStatSSE.textContent = stats.sseMessages;
      elStatError.textContent = stats.errorMessages;
    }

    async function fetchMessageDetail(id) {
      const res = await fetch(`${API_BASE}/api/messages/${id}`);
      return await res.json();
    }

    async function clearMessages() {
      await fetch(`${API_BASE}/api/messages`, { method: 'DELETE' });
      messages = [];
      lastTimestamp = 0;
      selectedId = null;
      render();
    }

    // --- Polling ---
    function startPolling() {
      stopPolling();
      const interval = (parseInt(elIntervalInput.value, 10) || 3) * 1000;
      pollTimer = setInterval(() => {
        fetchLatestMessages();
        fetchStats();
      }, interval);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    // --- Render ---
    function statusClass(status) {
      if (status >= 200 && status < 300) return 's2xx';
      if (status >= 300 && status < 400) return 's3xx';
      if (status >= 400 && status < 500) return 's4xx';
      return 's5xx';
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    function formatDuration(ms) {
      if (ms < 1000) return ms + 'ms';
      return (ms / 1000).toFixed(1) + 's';
    }

    function tryFormatJSON(str) {
      try {
        return JSON.stringify(JSON.parse(str), null, 2);
      } catch {
        return str;
      }
    }

    function renderMessageList() {
      elMsgCount.textContent = messages.length;
      if (messages.length === 0) {
        elMsgList.innerHTML = '<div class="empty-state">暂无消息，请通过代理端口发送请求</div>';
        return;
      }
      elMsgList.innerHTML = messages.map(m => `
        <div class="msg-item${m.id === selectedId ? ' selected' : ''}" data-id="${m.id}">
          <div>
            <span class="msg-seq">#${m.seq}</span>
            <span class="msg-method ${m.method}">${m.method}</span>
            <span class="msg-path">${m.path}</span>
            ${m.isSSE ? '<span class="sse-badge">SSE</span>' : ''}
          </div>
          <div class="msg-meta">
            <span class="msg-status ${statusClass(m.responseStatus)}">${m.responseStatus || '...'}</span>
            <span>${formatTime(m.timestamp)}</span>
            <span>${formatDuration(m.duration)}</span>
          </div>
        </div>
      `).reverse().join('');
    }

    function renderDetail(msg) {
      if (!msg) {
        elDetailContent.innerHTML = '<div class="no-selection">选择左侧消息查看详情</div>';
        elDetailHeader.textContent = '消息详情';
        return;
      }

      elDetailHeader.innerHTML = `
        <span class="msg-method ${msg.method}">${msg.method}</span>
        <span>${msg.path}</span>
        <span class="msg-status ${statusClass(msg.responseStatus)}">${msg.responseStatus}</span>
        ${msg.isSSE ? '<span class="sse-badge">SSE</span>' : ''}
        <span style="color:#999;margin-left:auto">${formatTime(msg.timestamp)} · ${formatDuration(msg.duration)}</span>
      `;

      const reqHeaders = Object.entries(msg.requestHeaders || {}).map(([k, v]) =>
        `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`
      ).join('');

      const resHeaders = Object.entries(msg.responseHeaders || {}).map(([k, v]) =>
        `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`
      ).join('');

      let sseSection = '';
      if (msg.isSSE && msg.sseChunks && msg.sseChunks.length > 0) {
        const chunksHtml = msg.sseChunks.map((c, i) =>
          `<div style="margin-bottom:4px;color:#999;font-size:11px">--- Chunk #${i + 1} @ ${formatTime(c.timestamp)} ---</div>` +
          `<div>${esc(c.data)}</div>`
        ).join('');
        sseSection = `
          <div class="section">
            <div class="section-title">SSE Chunks (${msg.sseChunks.length})</div>
            <div class="body-block sse-stream">${chunksHtml}</div>
          </div>
        `;
      }

      elDetailContent.innerHTML = `
        <div class="section">
          <div class="section-title">请求信息</div>
          <table class="kv-table">
            <tr><td>Method</td><td>${msg.method}</td></tr>
            <tr><td>URL</td><td>${esc(msg.url)}</td></tr>
          </table>
        </div>
        <div class="section">
          <div class="section-title">请求 Headers</div>
          <table class="kv-table">${reqHeaders || '<tr><td colspan="2" style="color:#aaa">无</td></tr>'}</table>
        </div>
        <div class="section">
          <div class="section-title">请求 Body<button class="copy-btn" data-copy="req-body">Copy</button></div>
          <div class="body-block" id="req-body">${msg.requestBody ? esc(tryFormatJSON(msg.requestBody)) : '<span style="color:#aaa">无</span>'}</div>
        </div>
        <div class="section">
          <div class="section-title">响应 Headers</div>
          <table class="kv-table">${resHeaders || '<tr><td colspan="2" style="color:#aaa">无</td></tr>'}</table>
        </div>
        <div class="section">
          <div class="section-title">响应 Body<button class="copy-btn" data-copy="res-body">Copy</button></div>
          <div class="body-block" id="res-body">${msg.responseBody ? esc(tryFormatJSON(msg.responseBody)) : '<span style="color:#aaa">无</span>'}</div>
        </div>
        ${sseSection}
      `;
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function render() {
      renderMessageList();
      fetchStats();
    }

    // --- Events ---
    elMsgList.addEventListener('click', async (e) => {
      const item = e.target.closest('.msg-item');
      if (!item) return;
      const id = item.dataset.id;
      selectedId = id;
      renderMessageList();
      const detail = await fetchMessageDetail(id);
      renderDetail(detail);
    });

    elDetailContent.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const targetId = btn.dataset.copy;
      const el = document.getElementById(targetId);
      if (!el) return;
      const text = el.textContent;
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
      } catch {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      }
    });

    elBtnToggle.addEventListener('click', () => {
      polling = !polling;
      if (polling) {
        startPolling();
        elBtnToggle.classList.add('active');
        elLiveDot.classList.remove('paused');
        elBtnToggle.innerHTML = '<span class="live-dot" id="live-dot"></span>自动刷新';
      } else {
        stopPolling();
        elBtnToggle.classList.remove('active');
        elBtnToggle.innerHTML = '<span class="live-dot paused" id="live-dot"></span>已暂停';
      }
    });

    elIntervalInput.addEventListener('change', () => {
      if (polling) startPolling();
    });

    elBtnClear.addEventListener('click', () => {
      if (confirm('确定清空所有消息？')) clearMessages();
    });

    // --- Init ---
    fetchAllMessages().then(() => {
      startPolling();
    });
  </script>
</body>
</html>
